description: >-
  NCR Corporation separated in October 2023 into two independent public companies: NCR Voyix, a global provider of
  digital commerce solutions for retailers and restaurants, and NCR Atleos, a leader in expanding self-directed banking
  through ATM networks. NCR Voyix operates the Voyix Commerce Platform, an API-based cloud architecture (the Business
  Services Platform) that powers unified-commerce POS, ecommerce, and payments for retail and restaurants. Developers
  access it at developer.ncrvoyix.com using AccessKey (HMAC SHA-512) authentication against api.ncr.com.
specificationVersion: '0.19'
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
apis:
  - aid: ncr:ncr-voyix-commerce-platform
    name: NCR Voyix Commerce Platform APIs
    description: >-
      REST APIs for the NCR Voyix Commerce Platform (Business Services Platform) covering Catalog (items, item-prices,
      item-attributes, item-details search), Category and Group management, Selling Service shopping carts, Order
      creation/lookup/search, Site (location) provisioning and geospatial search, Security (authentication,
      authorization, passwords, roles), and Provisioning (users and user profiles). Requests are signed with AccessKey
      (HMAC SHA-512) authentication and scoped with nep-organization and nep-enterprise-unit headers against api.ncr.com
      (production) / gateway-staging.ncrcloud.com (staging).
    humanURL: https://developer.ncrvoyix.com/
    baseURL: https://api.ncr.com
