naftiko: "1.0.0-alpha2"

info:
  label: "NCR Voyix Commerce Platform APIs — Order"
  description: >-
    Order surface of the NCR Voyix Commerce Platform. 4 operations. Lead operation: NCR Voyix Create Order.
    Self-contained Naftiko capability covering one NCR Voyix business surface.
  tags:
    - NCR Voyix
    - Commerce Platform
    - Order
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      NCR_VOYIX_SECRET_KEY: NCR_VOYIX_SECRET_KEY

capability:

  consumes:
    - type: http
      namespace: "ncr-voyix-commerce-platform-order"
      baseUri: "https://api.ncr.com"
      description: "NCR Voyix Commerce Platform APIs — Order business capability. AccessKey (HMAC) authenticated. Self-contained, no shared references."
      authentication:
        type: apikey
        key: Authorization
        value: "AccessKey {{env.NCR_VOYIX_SECRET_KEY}}"
        placement: header
      resources:
        - name: "order-3-orders-1-post"
          path: "/order/3/orders/1"
          operations:
            - name: "createOrder"
              method: POST
              description: "NCR Voyix Create Order"
              inputParameters:
                - name: "nep-enterprise-unit"
                  in: header
                  type: string
                  required: true
                  description: "Identifier of the enterprise unit (site/location) the request applies to."
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "order-3-orders-1-orderid-get"
          path: "/order/3/orders/1/{orderId}"
          operations:
            - name: "getOrderById"
              method: GET
              description: "NCR Voyix Get Order by Id"
              inputParameters:
                - name: "orderId"
                  in: path
                  type: string
                  required: true
                  description: "The order identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "order-3-orders-1-orderid-patch"
          path: "/order/3/orders/1/{orderId}"
          operations:
            - name: "updateOrderById"
              method: PATCH
              description: "NCR Voyix Update Order by Id"
              inputParameters:
                - name: "orderId"
                  in: path
                  type: string
                  required: true
                  description: "The order identifier."
                - name: "nep-enterprise-unit"
                  in: header
                  type: string
                  required: true
                  description: "Identifier of the enterprise unit (site/location) the request applies to."
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "order-3-orders-1-find-post"
          path: "/order/3/orders/1/find"
          operations:
            - name: "findOrders"
              method: POST
              description: "NCR Voyix Find Orders"
              inputParameters:
                - name: "pageSize"
                  in: query
                  type: integer
                  required: false
                  description: "pageSize"
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "ncr-voyix-commerce-platform-order-rest"
      port: 8080
      description: "REST adapter for NCR Voyix Commerce Platform APIs — Order. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/order/3/orders/1"
          name: "order-3-orders-1"
          description: "NCR Voyix Create Order"
          operations:
            - method: POST
              name: "createOrder"
              description: "NCR Voyix Create Order"
              call: "ncr-voyix-commerce-platform-order.createOrder"
              with:
                "nep-enterprise-unit": "rest.nep-enterprise-unit"
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/order/3/orders/1/{orderid}"
          name: "order-3-orders-1"
          description: "NCR Voyix Get Order by Id"
          operations:
            - method: GET
              name: "getOrderById"
              description: "NCR Voyix Get Order by Id"
              call: "ncr-voyix-commerce-platform-order.getOrderById"
              with:
                "orderId": "rest.orderId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/order/3/orders/1/{orderid}"
          name: "order-3-orders-1"
          description: "NCR Voyix Update Order by Id"
          operations:
            - method: PATCH
              name: "updateOrderById"
              description: "NCR Voyix Update Order by Id"
              call: "ncr-voyix-commerce-platform-order.updateOrderById"
              with:
                "orderId": "rest.orderId"
                "nep-enterprise-unit": "rest.nep-enterprise-unit"
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/order/3/orders/1/find"
          name: "order-3-orders-1-find"
          description: "NCR Voyix Find Orders"
          operations:
            - method: POST
              name: "findOrders"
              description: "NCR Voyix Find Orders"
              call: "ncr-voyix-commerce-platform-order.findOrders"
              with:
                "pageSize": "rest.pageSize"
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
    - type: mcp
      namespace: "ncr-voyix-commerce-platform-order-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for NCR Voyix Commerce Platform APIs — Order. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "create-order"
          description: "NCR Voyix Create Order"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "ncr-voyix-commerce-platform-order.createOrder"
          with:
            "nep-enterprise-unit": "tools.nep-enterprise-unit"
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "get-order-id"
          description: "NCR Voyix Get Order by Id"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "ncr-voyix-commerce-platform-order.getOrderById"
          with:
            "orderId": "tools.orderId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "update-order-id"
          description: "NCR Voyix Update Order by Id"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "ncr-voyix-commerce-platform-order.updateOrderById"
          with:
            "orderId": "tools.orderId"
            "nep-enterprise-unit": "tools.nep-enterprise-unit"
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "find-orders"
          description: "NCR Voyix Find Orders"
          hints:
            readOnly: true
            destructive: false
            idempotent: false
          call: "ncr-voyix-commerce-platform-order.findOrders"
          with:
            "pageSize": "tools.pageSize"
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
