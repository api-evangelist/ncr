naftiko: "1.0.0-alpha2"

info:
  label: "NCR Voyix Commerce Platform APIs — Security"
  description: >-
    Security surface of the NCR Voyix Commerce Platform. 4 operations. Lead operation: NCR Voyix Authenticate User.
    Self-contained Naftiko capability covering one NCR Voyix business surface.
  tags:
    - NCR Voyix
    - Commerce Platform
    - Security
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      NCR_VOYIX_SECRET_KEY: NCR_VOYIX_SECRET_KEY

capability:

  consumes:
    - type: http
      namespace: "ncr-voyix-commerce-platform-security"
      baseUri: "https://api.ncr.com"
      description: "NCR Voyix Commerce Platform APIs — Security business capability. AccessKey (HMAC) authenticated. Self-contained, no shared references."
      authentication:
        type: apikey
        key: Authorization
        value: "AccessKey {{env.NCR_VOYIX_SECRET_KEY}}"
        placement: header
      resources:
        - name: "security-authentication-login-post"
          path: "/security/authentication/login"
          operations:
            - name: "authenticateUser"
              method: POST
              description: "NCR Voyix Authenticate User"
              inputParameters:
                - name: "nep-organization"
                  in: header
                  type: string
                  required: true
                  description: "Identifier of the organization the request is scoped to."
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "security-authorization-post"
          path: "/security/authorization"
          operations:
            - name: "exchangeToken"
              method: POST
              description: "NCR Voyix Exchange Authorization Token"
              inputParameters:
                - name: "nep-organization"
                  in: header
                  type: string
                  required: true
                  description: "Identifier of the organization the request is scoped to."
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "security-security-user-passwords-username-put"
          path: "/security/security-user-passwords/{username}"
          operations:
            - name: "setUserPassword"
              method: PUT
              description: "NCR Voyix Set User Password"
              inputParameters:
                - name: "username"
                  in: path
                  type: string
                  required: true
                  description: "The platform username whose password is being set."
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "security-role-grants-user-grants-self-effective-roles-get"
          path: "/security/role-grants/user-grants/self/effective-roles"
          operations:
            - name: "getSelfEffectiveRoles"
              method: GET
              description: "NCR Voyix Get Self Effective Roles"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "ncr-voyix-commerce-platform-security-rest"
      port: 8080
      description: "REST adapter for NCR Voyix Commerce Platform APIs — Security. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/security/authentication/login"
          name: "security-authentication-login"
          description: "NCR Voyix Authenticate User"
          operations:
            - method: POST
              name: "authenticateUser"
              description: "NCR Voyix Authenticate User"
              call: "ncr-voyix-commerce-platform-security.authenticateUser"
              with:
                "nep-organization": "rest.nep-organization"
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/security/authorization"
          name: "security-authorization"
          description: "NCR Voyix Exchange Authorization Token"
          operations:
            - method: POST
              name: "exchangeToken"
              description: "NCR Voyix Exchange Authorization Token"
              call: "ncr-voyix-commerce-platform-security.exchangeToken"
              with:
                "nep-organization": "rest.nep-organization"
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/security/security-user-passwords/{username}"
          name: "security-security-user-passwords"
          description: "NCR Voyix Set User Password"
          operations:
            - method: PUT
              name: "setUserPassword"
              description: "NCR Voyix Set User Password"
              call: "ncr-voyix-commerce-platform-security.setUserPassword"
              with:
                "username": "rest.username"
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/security/role-grants/user-grants/self/effective-roles"
          name: "security-role-grants-user-grants-self-effective-roles"
          description: "NCR Voyix Get Self Effective Roles"
          operations:
            - method: GET
              name: "getSelfEffectiveRoles"
              description: "NCR Voyix Get Self Effective Roles"
              call: "ncr-voyix-commerce-platform-security.getSelfEffectiveRoles"
              outputParameters:
                - type: object
                  mapping: "$."
    - type: mcp
      namespace: "ncr-voyix-commerce-platform-security-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for NCR Voyix Commerce Platform APIs — Security. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "authenticate-user"
          description: "NCR Voyix Authenticate User"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "ncr-voyix-commerce-platform-security.authenticateUser"
          with:
            "nep-organization": "tools.nep-organization"
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "exchange-token"
          description: "NCR Voyix Exchange Authorization Token"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "ncr-voyix-commerce-platform-security.exchangeToken"
          with:
            "nep-organization": "tools.nep-organization"
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "set-user-password"
          description: "NCR Voyix Set User Password"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "ncr-voyix-commerce-platform-security.setUserPassword"
          with:
            "username": "tools.username"
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "get-self-effective-roles"
          description: "NCR Voyix Get Self Effective Roles"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "ncr-voyix-commerce-platform-security.getSelfEffectiveRoles"
          outputParameters:
            - type: object
              mapping: "$."
