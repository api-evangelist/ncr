naftiko: "1.0.0-alpha2"

info:
  label: "NCR Voyix Commerce Platform APIs — Category"
  description: >-
    Category surface of the NCR Voyix Commerce Platform. 7 operations. Lead operation: NCR Voyix List Category Nodes.
    Self-contained Naftiko capability covering one NCR Voyix business surface.
  tags:
    - NCR Voyix
    - Commerce Platform
    - Category
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      NCR_VOYIX_SECRET_KEY: NCR_VOYIX_SECRET_KEY

capability:

  consumes:
    - type: http
      namespace: "ncr-voyix-commerce-platform-category"
      baseUri: "https://api.ncr.com"
      description: "NCR Voyix Commerce Platform APIs — Category business capability. AccessKey (HMAC) authenticated. Self-contained, no shared references."
      authentication:
        type: apikey
        key: Authorization
        value: "AccessKey {{env.NCR_VOYIX_SECRET_KEY}}"
        placement: header
      resources:
        - name: "catalog-v2-category-nodes-get"
          path: "/catalog/v2/category-nodes"
          operations:
            - name: "listCategoryNodes"
              method: GET
              description: "NCR Voyix List Category Nodes"
              inputParameters:
                - name: "parentId"
                  in: query
                  type: string
                  required: false
                  description: "Filter to children of the supplied parent category node."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "catalog-v2-category-nodes-put"
          path: "/catalog/v2/category-nodes"
          operations:
            - name: "putCategoryNode"
              method: PUT
              description: "NCR Voyix Create or Update Category Node"
              inputParameters:
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "catalog-v2-category-nodes-nodeid-get"
          path: "/catalog/v2/category-nodes/{nodeId}"
          operations:
            - name: "getCategoryNode"
              method: GET
              description: "NCR Voyix Get Category Node"
              inputParameters:
                - name: "nodeId"
                  in: path
                  type: string
                  required: true
                  description: "The category node identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "catalog-v2-category-nodes-nodeid-ancestors-get"
          path: "/catalog/v2/category-nodes/{nodeId}/ancestors"
          operations:
            - name: "getCategoryNodeAncestors"
              method: GET
              description: "NCR Voyix Get Category Node Ancestors"
              inputParameters:
                - name: "nodeId"
                  in: path
                  type: string
                  required: true
                  description: "The category node identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "catalog-v2-groups-get"
          path: "/catalog/v2/groups"
          operations:
            - name: "listGroups"
              method: GET
              description: "NCR Voyix List Groups"
              inputParameters:
                - name: "pageSize"
                  in: query
                  type: integer
                  required: false
                  description: "pageSize"
                - name: "titlePattern"
                  in: query
                  type: string
                  required: false
                  description: "titlePattern"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "catalog-v2-groups-put"
          path: "/catalog/v2/groups"
          operations:
            - name: "putGroup"
              method: PUT
              description: "NCR Voyix Create or Update Group"
              inputParameters:
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "catalog-v2-groups-groupid-get"
          path: "/catalog/v2/groups/{groupId}"
          operations:
            - name: "getGroup"
              method: GET
              description: "NCR Voyix Get Group"
              inputParameters:
                - name: "groupId"
                  in: path
                  type: string
                  required: true
                  description: "The group identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "ncr-voyix-commerce-platform-category-rest"
      port: 8080
      description: "REST adapter for NCR Voyix Commerce Platform APIs — Category. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/catalog/v2/category-nodes"
          name: "catalog-v2-category-nodes"
          description: "NCR Voyix List Category Nodes"
          operations:
            - method: GET
              name: "listCategoryNodes"
              description: "NCR Voyix List Category Nodes"
              call: "ncr-voyix-commerce-platform-category.listCategoryNodes"
              with:
                "parentId": "rest.parentId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/catalog/v2/category-nodes"
          name: "catalog-v2-category-nodes"
          description: "NCR Voyix Create or Update Category Node"
          operations:
            - method: PUT
              name: "putCategoryNode"
              description: "NCR Voyix Create or Update Category Node"
              call: "ncr-voyix-commerce-platform-category.putCategoryNode"
              with:
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/catalog/v2/category-nodes/{nodeid}"
          name: "catalog-v2-category-nodes"
          description: "NCR Voyix Get Category Node"
          operations:
            - method: GET
              name: "getCategoryNode"
              description: "NCR Voyix Get Category Node"
              call: "ncr-voyix-commerce-platform-category.getCategoryNode"
              with:
                "nodeId": "rest.nodeId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/catalog/v2/category-nodes/{nodeid}/ancestors"
          name: "catalog-v2-category-nodes-ancestors"
          description: "NCR Voyix Get Category Node Ancestors"
          operations:
            - method: GET
              name: "getCategoryNodeAncestors"
              description: "NCR Voyix Get Category Node Ancestors"
              call: "ncr-voyix-commerce-platform-category.getCategoryNodeAncestors"
              with:
                "nodeId": "rest.nodeId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/catalog/v2/groups"
          name: "catalog-v2-groups"
          description: "NCR Voyix List Groups"
          operations:
            - method: GET
              name: "listGroups"
              description: "NCR Voyix List Groups"
              call: "ncr-voyix-commerce-platform-category.listGroups"
              with:
                "pageSize": "rest.pageSize"
                "titlePattern": "rest.titlePattern"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/catalog/v2/groups"
          name: "catalog-v2-groups"
          description: "NCR Voyix Create or Update Group"
          operations:
            - method: PUT
              name: "putGroup"
              description: "NCR Voyix Create or Update Group"
              call: "ncr-voyix-commerce-platform-category.putGroup"
              with:
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/catalog/v2/groups/{groupid}"
          name: "catalog-v2-groups"
          description: "NCR Voyix Get Group"
          operations:
            - method: GET
              name: "getGroup"
              description: "NCR Voyix Get Group"
              call: "ncr-voyix-commerce-platform-category.getGroup"
              with:
                "groupId": "rest.groupId"
              outputParameters:
                - type: object
                  mapping: "$."
    - type: mcp
      namespace: "ncr-voyix-commerce-platform-category-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for NCR Voyix Commerce Platform APIs — Category. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "list-category-nodes"
          description: "NCR Voyix List Category Nodes"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "ncr-voyix-commerce-platform-category.listCategoryNodes"
          with:
            "parentId": "tools.parentId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "put-category-node"
          description: "NCR Voyix Create or Update Category Node"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "ncr-voyix-commerce-platform-category.putCategoryNode"
          with:
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "get-category-node"
          description: "NCR Voyix Get Category Node"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "ncr-voyix-commerce-platform-category.getCategoryNode"
          with:
            "nodeId": "tools.nodeId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "get-category-node-ancestors"
          description: "NCR Voyix Get Category Node Ancestors"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "ncr-voyix-commerce-platform-category.getCategoryNodeAncestors"
          with:
            "nodeId": "tools.nodeId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "list-groups"
          description: "NCR Voyix List Groups"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "ncr-voyix-commerce-platform-category.listGroups"
          with:
            "pageSize": "tools.pageSize"
            "titlePattern": "tools.titlePattern"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "put-group"
          description: "NCR Voyix Create or Update Group"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "ncr-voyix-commerce-platform-category.putGroup"
          with:
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "get-group"
          description: "NCR Voyix Get Group"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "ncr-voyix-commerce-platform-category.getGroup"
          with:
            "groupId": "tools.groupId"
          outputParameters:
            - type: object
              mapping: "$."
