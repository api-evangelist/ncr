naftiko: "1.0.0-alpha2"

info:
  label: "NCR Voyix Commerce Platform APIs — Selling"
  description: >-
    Selling surface of the NCR Voyix Commerce Platform. 8 operations. Lead operation: NCR Voyix Create Cart.
    Self-contained Naftiko capability covering one NCR Voyix business surface.
  tags:
    - NCR Voyix
    - Commerce Platform
    - Selling
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      NCR_VOYIX_SECRET_KEY: NCR_VOYIX_SECRET_KEY

capability:

  consumes:
    - type: http
      namespace: "ncr-voyix-commerce-platform-selling"
      baseUri: "https://api.ncr.com"
      description: "NCR Voyix Commerce Platform APIs — Selling business capability. AccessKey (HMAC) authenticated. Self-contained, no shared references."
      authentication:
        type: apikey
        key: Authorization
        value: "AccessKey {{env.NCR_VOYIX_SECRET_KEY}}"
        placement: header
      resources:
        - name: "emerald-selling-service-cart-v1-carts-post"
          path: "/emerald/selling-service/cart/v1/carts"
          operations:
            - name: "createCart"
              method: POST
              description: "NCR Voyix Create Cart"
              inputParameters:
                - name: "nep-enterprise-unit"
                  in: header
                  type: string
                  required: true
                  description: "Identifier of the enterprise unit (site/location) the request applies to."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "emerald-selling-service-cart-v1-carts-cartid-get"
          path: "/emerald/selling-service/cart/v1/carts/{cartId}"
          operations:
            - name: "getCartById"
              method: GET
              description: "NCR Voyix Get Cart by Id"
              inputParameters:
                - name: "cartId"
                  in: path
                  type: string
                  required: true
                  description: "The shopping cart identifier."
                - name: "nep-enterprise-unit"
                  in: header
                  type: string
                  required: true
                  description: "Identifier of the enterprise unit (site/location) the request applies to."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "emerald-selling-service-cart-v1-carts-cartid-patch"
          path: "/emerald/selling-service/cart/v1/carts/{cartId}"
          operations:
            - name: "updateCart"
              method: PATCH
              description: "NCR Voyix Update Cart Status"
              inputParameters:
                - name: "cartId"
                  in: path
                  type: string
                  required: true
                  description: "The shopping cart identifier."
                - name: "nep-enterprise-unit"
                  in: header
                  type: string
                  required: true
                  description: "Identifier of the enterprise unit (site/location) the request applies to."
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "emerald-selling-service-cart-v1-carts-cartid-delete"
          path: "/emerald/selling-service/cart/v1/carts/{cartId}"
          operations:
            - name: "deleteCart"
              method: DELETE
              description: "NCR Voyix Delete Cart"
              inputParameters:
                - name: "cartId"
                  in: path
                  type: string
                  required: true
                  description: "The shopping cart identifier."
                - name: "nep-enterprise-unit"
                  in: header
                  type: string
                  required: true
                  description: "Identifier of the enterprise unit (site/location) the request applies to."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "emerald-selling-service-cart-v1-carts-cartid-items-get"
          path: "/emerald/selling-service/cart/v1/carts/{cartId}/items"
          operations:
            - name: "getCartItems"
              method: GET
              description: "NCR Voyix Get Cart Items"
              inputParameters:
                - name: "cartId"
                  in: path
                  type: string
                  required: true
                  description: "The shopping cart identifier."
                - name: "nep-enterprise-unit"
                  in: header
                  type: string
                  required: true
                  description: "Identifier of the enterprise unit (site/location) the request applies to."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "emerald-selling-service-cart-v1-carts-cartid-items-post"
          path: "/emerald/selling-service/cart/v1/carts/{cartId}/items"
          operations:
            - name: "addItemToCart"
              method: POST
              description: "NCR Voyix Add Item to Cart"
              inputParameters:
                - name: "cartId"
                  in: path
                  type: string
                  required: true
                  description: "The shopping cart identifier."
                - name: "nep-enterprise-unit"
                  in: header
                  type: string
                  required: true
                  description: "Identifier of the enterprise unit (site/location) the request applies to."
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "emerald-selling-service-cart-v1-carts-cartid-items-lineid-patch"
          path: "/emerald/selling-service/cart/v1/carts/{cartId}/items/{lineId}"
          operations:
            - name: "updateItemInCart"
              method: PATCH
              description: "NCR Voyix Update Item in Cart"
              inputParameters:
                - name: "cartId"
                  in: path
                  type: string
                  required: true
                  description: "The shopping cart identifier."
                - name: "lineId"
                  in: path
                  type: string
                  required: true
                  description: "The cart line identifier."
                - name: "nep-enterprise-unit"
                  in: header
                  type: string
                  required: true
                  description: "Identifier of the enterprise unit (site/location) the request applies to."
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "emerald-selling-service-cart-v1-carts-cartid-items-lineid-delete"
          path: "/emerald/selling-service/cart/v1/carts/{cartId}/items/{lineId}"
          operations:
            - name: "removeItemFromCart"
              method: DELETE
              description: "NCR Voyix Remove Item from Cart"
              inputParameters:
                - name: "cartId"
                  in: path
                  type: string
                  required: true
                  description: "The shopping cart identifier."
                - name: "lineId"
                  in: path
                  type: string
                  required: true
                  description: "The cart line identifier."
                - name: "nep-enterprise-unit"
                  in: header
                  type: string
                  required: true
                  description: "Identifier of the enterprise unit (site/location) the request applies to."
                - name: "body"
                  in: body
                  type: object
                  required: false
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "ncr-voyix-commerce-platform-selling-rest"
      port: 8080
      description: "REST adapter for NCR Voyix Commerce Platform APIs — Selling. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/emerald/selling-service/cart/v1/carts"
          name: "emerald-selling-service-cart-v1-carts"
          description: "NCR Voyix Create Cart"
          operations:
            - method: POST
              name: "createCart"
              description: "NCR Voyix Create Cart"
              call: "ncr-voyix-commerce-platform-selling.createCart"
              with:
                "nep-enterprise-unit": "rest.nep-enterprise-unit"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/emerald/selling-service/cart/v1/carts/{cartid}"
          name: "emerald-selling-service-cart-v1-carts"
          description: "NCR Voyix Get Cart by Id"
          operations:
            - method: GET
              name: "getCartById"
              description: "NCR Voyix Get Cart by Id"
              call: "ncr-voyix-commerce-platform-selling.getCartById"
              with:
                "cartId": "rest.cartId"
                "nep-enterprise-unit": "rest.nep-enterprise-unit"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/emerald/selling-service/cart/v1/carts/{cartid}"
          name: "emerald-selling-service-cart-v1-carts"
          description: "NCR Voyix Update Cart Status"
          operations:
            - method: PATCH
              name: "updateCart"
              description: "NCR Voyix Update Cart Status"
              call: "ncr-voyix-commerce-platform-selling.updateCart"
              with:
                "cartId": "rest.cartId"
                "nep-enterprise-unit": "rest.nep-enterprise-unit"
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/emerald/selling-service/cart/v1/carts/{cartid}"
          name: "emerald-selling-service-cart-v1-carts"
          description: "NCR Voyix Delete Cart"
          operations:
            - method: DELETE
              name: "deleteCart"
              description: "NCR Voyix Delete Cart"
              call: "ncr-voyix-commerce-platform-selling.deleteCart"
              with:
                "cartId": "rest.cartId"
                "nep-enterprise-unit": "rest.nep-enterprise-unit"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/emerald/selling-service/cart/v1/carts/{cartid}/items"
          name: "emerald-selling-service-cart-v1-carts-items"
          description: "NCR Voyix Get Cart Items"
          operations:
            - method: GET
              name: "getCartItems"
              description: "NCR Voyix Get Cart Items"
              call: "ncr-voyix-commerce-platform-selling.getCartItems"
              with:
                "cartId": "rest.cartId"
                "nep-enterprise-unit": "rest.nep-enterprise-unit"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/emerald/selling-service/cart/v1/carts/{cartid}/items"
          name: "emerald-selling-service-cart-v1-carts-items"
          description: "NCR Voyix Add Item to Cart"
          operations:
            - method: POST
              name: "addItemToCart"
              description: "NCR Voyix Add Item to Cart"
              call: "ncr-voyix-commerce-platform-selling.addItemToCart"
              with:
                "cartId": "rest.cartId"
                "nep-enterprise-unit": "rest.nep-enterprise-unit"
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/emerald/selling-service/cart/v1/carts/{cartid}/items/{lineid}"
          name: "emerald-selling-service-cart-v1-carts-items"
          description: "NCR Voyix Update Item in Cart"
          operations:
            - method: PATCH
              name: "updateItemInCart"
              description: "NCR Voyix Update Item in Cart"
              call: "ncr-voyix-commerce-platform-selling.updateItemInCart"
              with:
                "cartId": "rest.cartId"
                "lineId": "rest.lineId"
                "nep-enterprise-unit": "rest.nep-enterprise-unit"
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/emerald/selling-service/cart/v1/carts/{cartid}/items/{lineid}"
          name: "emerald-selling-service-cart-v1-carts-items"
          description: "NCR Voyix Remove Item from Cart"
          operations:
            - method: DELETE
              name: "removeItemFromCart"
              description: "NCR Voyix Remove Item from Cart"
              call: "ncr-voyix-commerce-platform-selling.removeItemFromCart"
              with:
                "cartId": "rest.cartId"
                "lineId": "rest.lineId"
                "nep-enterprise-unit": "rest.nep-enterprise-unit"
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
    - type: mcp
      namespace: "ncr-voyix-commerce-platform-selling-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for NCR Voyix Commerce Platform APIs — Selling. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "create-cart"
          description: "NCR Voyix Create Cart"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "ncr-voyix-commerce-platform-selling.createCart"
          with:
            "nep-enterprise-unit": "tools.nep-enterprise-unit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "get-cart-id"
          description: "NCR Voyix Get Cart by Id"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "ncr-voyix-commerce-platform-selling.getCartById"
          with:
            "cartId": "tools.cartId"
            "nep-enterprise-unit": "tools.nep-enterprise-unit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "update-cart"
          description: "NCR Voyix Update Cart Status"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "ncr-voyix-commerce-platform-selling.updateCart"
          with:
            "cartId": "tools.cartId"
            "nep-enterprise-unit": "tools.nep-enterprise-unit"
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "delete-cart"
          description: "NCR Voyix Delete Cart"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "ncr-voyix-commerce-platform-selling.deleteCart"
          with:
            "cartId": "tools.cartId"
            "nep-enterprise-unit": "tools.nep-enterprise-unit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "get-cart-items"
          description: "NCR Voyix Get Cart Items"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "ncr-voyix-commerce-platform-selling.getCartItems"
          with:
            "cartId": "tools.cartId"
            "nep-enterprise-unit": "tools.nep-enterprise-unit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "add-item-cart"
          description: "NCR Voyix Add Item to Cart"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "ncr-voyix-commerce-platform-selling.addItemToCart"
          with:
            "cartId": "tools.cartId"
            "nep-enterprise-unit": "tools.nep-enterprise-unit"
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "update-item-cart"
          description: "NCR Voyix Update Item in Cart"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "ncr-voyix-commerce-platform-selling.updateItemInCart"
          with:
            "cartId": "tools.cartId"
            "lineId": "tools.lineId"
            "nep-enterprise-unit": "tools.nep-enterprise-unit"
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "remove-item-cart"
          description: "NCR Voyix Remove Item from Cart"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "ncr-voyix-commerce-platform-selling.removeItemFromCart"
          with:
            "cartId": "tools.cartId"
            "lineId": "tools.lineId"
            "nep-enterprise-unit": "tools.nep-enterprise-unit"
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
