              mapping: "$."
        - name: "create-catalog-item-prices"
          description: "NCR Voyix Create or Update Item Prices"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "ncr-voyix-commerce-platform-catalog.createCatalogItemPrices"
          with:
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "update-item-price-item-code"
          description: "NCR Voyix Update Item Price by Item Code"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "ncr-voyix-commerce-platform-catalog.updateItemPriceByItemCode"
          with:
            "itemCode": "tools.itemCode"
            "priceCode": "tools.priceCode"
            "nep-enterprise-unit": "tools.nep-enterprise-unit"
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "get-multiple-item-prices"
          description: "NCR Voyix Get Multiple Item Prices"
          hints:
            readOnly: true
            destructive: false
            idempotent: false
          call: "ncr-voyix-commerce-platform-catalog.getMultipleItemPrices"
          with:
            "nep-enterprise-unit": "tools.nep-enterprise-unit"
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "get-multiple-item-attributes"
          description: "NCR Voyix Get Multiple Item Attributes"
          hints:
            readOnly: true
            destructive: false
            idempotent: false
          call: "ncr-voyix-commerce-platform-catalog.getMultipleItemAttributes"
          with:
            "nep-enterprise-unit": "tools.nep-enterprise-unit"
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "update-item-attributes-item-code"
          description: "NCR Voyix Update Item Attributes by Item Code"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "ncr-voyix-commerce-platform-catalog.updateItemAttributesByItemCode"
          with:
            "itemCode": "tools.itemCode"
