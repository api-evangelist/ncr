naftiko: "1.0.0-alpha2"

info:
  label: "NCR Voyix Commerce Platform APIs — Site"
  description: >-
    Site surface of the NCR Voyix Commerce Platform. 6 operations. Lead operation: NCR Voyix Create Site.
    Self-contained Naftiko capability covering one NCR Voyix business surface.
  tags:
    - NCR Voyix
    - Commerce Platform
    - Site
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      NCR_VOYIX_SECRET_KEY: NCR_VOYIX_SECRET_KEY

capability:

  consumes:
    - type: http
      namespace: "ncr-voyix-commerce-platform-site"
      baseUri: "https://api.ncr.com"
      description: "NCR Voyix Commerce Platform APIs — Site business capability. AccessKey (HMAC) authenticated. Self-contained, no shared references."
      authentication:
        type: apikey
        key: Authorization
        value: "AccessKey {{env.NCR_VOYIX_SECRET_KEY}}"
        placement: header
      resources:
        - name: "site-sites-post"
          path: "/site/sites"
          operations:
            - name: "createSite"
              method: POST
              description: "NCR Voyix Create Site"
              inputParameters:
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "site-sites-siteid-get"
          path: "/site/sites/{siteId}"
          operations:
            - name: "getSiteById"
              method: GET
              description: "NCR Voyix Get Site by Id"
              inputParameters:
                - name: "siteId"
                  in: path
                  type: string
                  required: true
                  description: "The alphanumeric site identifier (not the site name)."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "site-sites-siteid-put"
          path: "/site/sites/{siteId}"
          operations:
            - name: "updateSite"
              method: PUT
              description: "NCR Voyix Update Site"
              inputParameters:
                - name: "siteId"
                  in: path
                  type: string
                  required: true
                  description: "The alphanumeric site identifier (not the site name)."
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "site-sites-find-by-criteria-post"
          path: "/site/sites/find-by-criteria"
          operations:
            - name: "findSitesByCriteria"
              method: POST
              description: "NCR Voyix Find Sites by Criteria"
              inputParameters:
                - name: "pageSize"
                  in: query
                  type: integer
                  required: false
                  description: "pageSize"
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "site-sites-find-nearby-coordinates-get"
          path: "/site/sites/find-nearby/{coordinates}"
          operations:
            - name: "findNearbySites"
              method: GET
              description: "NCR Voyix Find Nearby Sites"
              inputParameters:
                - name: "coordinates"
                  in: path
                  type: string
                  required: true
                  description: "Latitude and longitude as '{latitude},{longitude}'."
                - name: "radius"
                  in: query
                  type: integer
                  required: false
                  description: "Search radius in meters."
                - name: "numSites"
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of sites to return."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "site-sites-by-reference-id-referenceid-get"
          path: "/site/sites/by-reference-id/{referenceId}"
          operations:
            - name: "getSiteByReferenceId"
              method: GET
              description: "NCR Voyix Get Site by Reference Id"
              inputParameters:
                - name: "referenceId"
                  in: path
                  type: string
                  required: true
                  description: "The external reference identifier for the site."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "ncr-voyix-commerce-platform-site-rest"
      port: 8080
      description: "REST adapter for NCR Voyix Commerce Platform APIs — Site. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/site/sites"
          name: "site-sites"
          description: "NCR Voyix Create Site"
          operations:
            - method: POST
              name: "createSite"
              description: "NCR Voyix Create Site"
              call: "ncr-voyix-commerce-platform-site.createSite"
              with:
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/site/sites/{siteid}"
          name: "site-sites"
          description: "NCR Voyix Get Site by Id"
          operations:
            - method: GET
              name: "getSiteById"
              description: "NCR Voyix Get Site by Id"
              call: "ncr-voyix-commerce-platform-site.getSiteById"
              with:
                "siteId": "rest.siteId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/site/sites/{siteid}"
          name: "site-sites"
          description: "NCR Voyix Update Site"
          operations:
            - method: PUT
              name: "updateSite"
              description: "NCR Voyix Update Site"
              call: "ncr-voyix-commerce-platform-site.updateSite"
              with:
                "siteId": "rest.siteId"
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/site/sites/find-by-criteria"
          name: "site-sites-find-by-criteria"
          description: "NCR Voyix Find Sites by Criteria"
          operations:
            - method: POST
              name: "findSitesByCriteria"
              description: "NCR Voyix Find Sites by Criteria"
              call: "ncr-voyix-commerce-platform-site.findSitesByCriteria"
              with:
                "pageSize": "rest.pageSize"
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/site/sites/find-nearby/{coordinates}"
          name: "site-sites-find-nearby"
          description: "NCR Voyix Find Nearby Sites"
          operations:
            - method: GET
              name: "findNearbySites"
              description: "NCR Voyix Find Nearby Sites"
              call: "ncr-voyix-commerce-platform-site.findNearbySites"
              with:
                "coordinates": "rest.coordinates"
                "radius": "rest.radius"
                "numSites": "rest.numSites"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/site/sites/by-reference-id/{referenceid}"
          name: "site-sites-by-reference-id"
          description: "NCR Voyix Get Site by Reference Id"
          operations:
            - method: GET
              name: "getSiteByReferenceId"
              description: "NCR Voyix Get Site by Reference Id"
              call: "ncr-voyix-commerce-platform-site.getSiteByReferenceId"
              with:
                "referenceId": "rest.referenceId"
              outputParameters:
                - type: object
                  mapping: "$."
    - type: mcp
      namespace: "ncr-voyix-commerce-platform-site-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for NCR Voyix Commerce Platform APIs — Site. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "create-site"
          description: "NCR Voyix Create Site"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "ncr-voyix-commerce-platform-site.createSite"
          with:
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "get-site-id"
          description: "NCR Voyix Get Site by Id"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "ncr-voyix-commerce-platform-site.getSiteById"
          with:
            "siteId": "tools.siteId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "update-site"
          description: "NCR Voyix Update Site"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "ncr-voyix-commerce-platform-site.updateSite"
          with:
            "siteId": "tools.siteId"
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "find-sites-criteria"
          description: "NCR Voyix Find Sites by Criteria"
          hints:
            readOnly: true
            destructive: false
            idempotent: false
          call: "ncr-voyix-commerce-platform-site.findSitesByCriteria"
          with:
            "pageSize": "tools.pageSize"
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "find-nearby-sites"
          description: "NCR Voyix Find Nearby Sites"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "ncr-voyix-commerce-platform-site.findNearbySites"
          with:
            "coordinates": "tools.coordinates"
            "radius": "tools.radius"
            "numSites": "tools.numSites"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "get-site-reference-id"
          description: "NCR Voyix Get Site by Reference Id"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "ncr-voyix-commerce-platform-site.getSiteByReferenceId"
          with:
            "referenceId": "tools.referenceId"
          outputParameters:
            - type: object
              mapping: "$."
